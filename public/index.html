<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYP2P - BitChat</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Ultra Minimalist Login Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <div class="lang-selector">
                <button class="lang-btn active" onclick="changeLanguage('tr')">🇹🇷</button>
                <button class="lang-btn" onclick="changeLanguage('ar')">🇸🇾</button>
                <button class="lang-btn" onclick="changeLanguage('en')">🇺🇸</button>
            </div>

            <h2 id="lang-welcome">BitChat P2P</h2>
            <p id="lang-instruction" style="margin-bottom: 20px; opacity: 0.8; font-size: 0.9rem;">BitChat'e hoş
                geldiniz. Başlamak için bir rumuz girin.</p>

            <input type="text" id="username-input" placeholder="Rumuz / Nickname..." maxlength="15">
            <button class="login-btn" id="login-btn">Bağlan</button>

            <p id="lang-encryption-msg"
                style="margin-top: 25px; font-size: 0.7rem; font-weight: 600; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">
                Bluetooth P2P Şifreli Haberleşme 🇸🇾
            </p>
        </div>
    </div>

    <!-- Main App Container -->
    <div class="container">
        <header>
            <h1 id="app-title">SYP2P</h1>
            <div id="bt-scan" class="bt-icon">📡 Bluetooth P2P</div>
        </header>

        <div id="chat-window">
            <div class="system-msg">P2P Ağı Kararlı</div>
            <div id="messages"></div>
        </div>

        <!-- Voice Recorder Visualizer Popover -->
        <div id="recorder-status" class="recorder-hidden">
            <div class="recorder-bar"></div>
            <span id="recorder-time">00:00</span>
        </div>

        <footer>
            <button class="action-btn" id="attach-btn" title="Dosya Ekle">📎</button>
            <input type="text" id="message-input" placeholder="Mesaj..." disabled>
            <button class="action-btn" id="mic-btn" title="Sesli Mesaj">🎤</button>
            <button id="send-btn" disabled>🚀</button>
            </header>

            <!-- Hidden Inputs for Media -->
            <input type="file" id="photo-input" accept="image/*" style="display: none;">
    </div>

    <!-- Bluetooth Discovery Modal -->
    <div id="discovery-modal">
        <div class="modal-content">
            <h3 id="lang-bt-title">Cihaz Bulma</h3>
            <div id="bt-status" style="font-size: 0.8rem; margin: 10px 0; color: #666;">...</div>
            <div id="device-list">
                <!-- Devices will appear here -->
            </div>
            <button id="close-modal" class="login-btn"
                style="background: #666; padding: 10px; margin-top: 15px;">Kapat</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
