<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BitChat P2P - Çevrimdışı Haberleşme</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="description"
        content="İnternetsiz, sadece Bluetooth ve yerel ağ üzerinde çalışan haberleşme uygulaması.">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div id="login-overlay">
        <div class="login-card">
            <h2 id="lang-welcome">BitChat P2P</h2>
            <div class="lang-selector">
                <button onclick="changeLanguage('tr')" class="lang-btn active">🇹🇷</button>
                <button onclick="changeLanguage('ar')" class="lang-btn">🇸🇾</button>
                <button onclick="changeLanguage('en')" class="lang-btn">🇺🇸</button>
            </div>

            <p id="lang-instruction" style="margin-top: 25px; font-weight: 500;">BitChat'e hoş geldiniz. Başlamak için
                bir rumuz girin.</p>
            <input type="text" id="username-input" placeholder="..." maxlength="12">
            <button class="login-btn" id="login-btn">Bağlan / Connect</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1 id="chat-title">BitChat P2P</h1>
            <div class="bt-icon" id="bt-scan">📡 Bluetooth</div>
        </header>

        <main id="chat-window">
            <div id="messages">
                <div class="system-msg" id="lang-encryption-msg">Bluetooth P2P Haberleşme Ağı 🇸🇾</div>
            </div>
        </main>

        <footer>
            <div id="recorder-status" class="recorder-hidden">
                <div class="recorder-bar"></div>
                <span id="recorder-time">00:00</span>
            </div>
            <div class="footer-actions">
                <button id="attach-btn" class="action-btn">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path
                            d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z">
                        </path>
                    </svg>
                </button>
                <input type="file" id="photo-input" accept="image/*" style="display: none;">
                <input type="file" id="audio-input" accept="audio/*" style="display: none;">
            </div>
            <input type="text" id="message-input" placeholder="..." disabled>
            <button id="mic-btn" class="action-btn mic-idle">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path>
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z">
                    </path>
                </svg>
            </button>
            <button id="send-btn" disabled>
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z">
                    </path>
                </svg>
            </button>
        </footer>

        <div id="discovery-modal">
            <div class="modal-content">
                <h2 id="lang-bt-title" style="font-size: 1.2rem; margin-bottom: 1rem; color: var(--green);">Bluetooth
                </h2>
                <p id="bt-status" style="font-size: 0.9rem; color: var(--text-dim);"></p>
                <div id="device-list"></div>
                <button id="close-modal">Kapat / Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('SW registered: ', registration);
                }, (err) => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
