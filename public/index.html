<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Surbit 🇸🇾 - P2P Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Giriş Ekranı -->
    <div id="login-overlay">
        <div class="login-card">
            <div class="lang-selector">
                <button class="lang-btn" id="lang-tr" onclick="changeLanguage('tr')">🇹🇷</button>
                <button class="lang-btn" id="lang-ar" onclick="changeLanguage('ar')">🇸🇾</button>
                <button class="lang-btn" id="lang-en" onclick="changeLanguage('en')">🇺🇸</button>
            </div>
            <h2 id="lang-welcome">Surbit 🇸🇾</h2>
            <p id="lang-instruction">Lütfen bir rumuz girerek başlayın.</p>
            <input type="text" id="username-input" placeholder="Rumuz..." maxlength="15">
            <button class="login-btn" id="login-btn">Bağlan</button>
            <p class="encryption-msg" id="lang-encryption">Bluetooth P2P Şifreli 🇸🇾</p>
        </div>
    </div>

    <!-- Loading Ekranı (iPhone Style) -->
    <div id="loading-overlay" class="loader-hidden">
        <div class="ios-spinner">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <!-- Ana Uygulama Konteynırı -->
    <div class="container">

        <!-- DM Listesi Görünümü -->
        <div id="dm-view" class="view-active">
            <header>
                <div class="header-main">
                    <h1 id="app-title">Surbit 🇸🇾</h1>
                    <div id="status-badge" class="badge">Bluetooth Aktif</div>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <button id="lang-cycle-btn" class="lang-icon-btn">🌐</button>
                    <div id="bt-refresh" class="bt-icon">🔄</div>
                </div>
            </header>

            <div id="dm-list-container">
                <div class="dm-section-title" id="lang-active-title">Aktif P2P Cihazları</div>
                <div id="dm-list">
                    <div class="empty-state" id="lang-scanning">Cihazlar taranıyor...</div>
                </div>
            </div>
        </div>

        <!-- Chat Görünümü -->
        <div id="chat-view" class="view-hidden">
            <header>
                <div style="display: flex; align-items: center; gap: 15px; flex: 1;">
                    <button id="back-to-dm" class="icon-btn">⬅️</button>
                    <div class="chat-header-info">
                        <div id="chat-with-name">...</div>
                        <div class="chat-status" id="lang-p2p-status">P2P Bağlantısı Aktif</div>
                    </div>
                </div>
                <button id="chat-lang-cycle-btn" class="lang-icon-btn">🌐</button>
            </header>

            <div id="messages-window">
                <div id="messages"></div>
            </div>

            <div class="chat-footer">
                <button class="action-btn" id="attach-plus-btn">➕</button>
                <div class="input-wrapper">
                    <input type="text" id="message-input" placeholder="Mesaj yazın..." disabled>
                </div>
                <button class="action-btn" id="mic-btn">🎤</button>
                <button id="send-btn" disabled>🚀</button>
            </div>
        </div>

        <!-- Ses Kayıt Durumu -->
        <div id="recorder-status" class="recorder-hidden">
            <div class="recorder-bar"></div>
            <span id="recorder-time">00:00</span>
        </div>

        <input type="file" id="photo-input" accept="image/*" style="display: none;">
    </div>

    <!-- Bağlantı İsteği Modalı -->
    <div id="request-modal" class="modal-hidden">
        <div class="modal-content">
            <h3 id="lang-request-title">Bağlantı İsteği</h3>
            <p id="request-msg">...</p>
            <div class="modal-actions">
                <button id="refuse-btn" class="modal-btn secondary">Reddet</button>
                <button id="accept-btn" class="modal-btn primary">Kabul Et</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
